services:
  mendix-rag-demo:
    container_name: mendix-rag-demo
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: production
      PORT: 3009
      HOSTNAME: 0.0.0.0
    volumes:
      - ./data:/app/data
    restart: unless-stopped
